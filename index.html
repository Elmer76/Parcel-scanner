<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Warehouse Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: Arial; background: #0d1117; color: #c9d1d9; margin: 0; padding: 10px; transition: background 0.3s; }
.box { max-width: 500px; margin: auto; background: #161b22; padding: 20px; border-radius: 12px; }
h2 { text-align: center; color: #f0883e; margin: 0 0 15px 0; }
.mode-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
.mode-toggle button { flex: 1; background: #21262d; color: #c9d1d9; }
.mode-toggle button.active { background: #1f6feb; color: #fff; }
#reader { width: 100%; border: 2px solid #30363d; border-radius: 8px; overflow: hidden; margin: 10px 0; }
input { width: 100%; padding: 10px; margin: 6px 0; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; font-size: 16px; }
button { width: 100%; padding: 12px; margin-top: 8px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
.btn-scan { background: #1f6feb; color: #fff; }
.btn-submit { background: #238636; color: #fff; }
.btn-stop { background: #da3633; color: #fff; }
.btn-check { background: #8957e5; color: #fff; }
.btn-install { background: #f0883e; color: #0d1117; display: none; }
label { font-size: 14px; color: #8b949e; display: block; margin-top: 10px; }
.row { display: flex; gap: 10px; }
.row > div { flex: 1; }
#result { margin-top: 15px; padding: 15px; background: #0d1117; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; min-height: 60px; }
#missingList { display:none; margin-top:15px; padding:15px; background:#0d1117; border-radius:8px; max-height:300px; overflow-y:auto; font-size:14px; text-align:left; }
.ok { color: #3fb950; }
.duplicate { color: #f85149; background: #490202!important; animation: flash 0.5s 3; }
.notfound { color: #f0883e; background: #4c2900!important; animation: flash 0.5s 3; }
.err { color: #f85149; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
body.alarm { background: #4c0000; }
</style>
</head>
<body>
<div class="box">
<h2>Warehouse Scanner</h2>
<button class="btn-install" id="btnInstall">📲 Install App</button>
<div class="mode-toggle">
<button id="btnReceive" class="active" onclick="setMode('receive')">📥 RECEIVE</button>
<button id="btnShip" onclick="setMode('ship')">📤 SHIP OUT</button>
</div>
<label>Google Script URL</label>
<input type="text" id="scriptUrl" placeholder="Paste Apps Script URL">
<label>Your Name</label>
<input type="text" id="deviceName" placeholder="Staff Name" value="Warehouse">
<div id="reader" style="display:none;"></div>
<button class="btn-scan" id="btnScan" onclick="startScan()">📷 Start Scan</button>
<button class="btn-stop" id="btnStop" onclick="stopScan()" style="display:none;">Stop Camera</button>
<label>Tracking No / QR Data</label>
<input type="text" id="scanData" placeholder="Auto-filled after scan">
<div id="receiveFields">
<label>Product Name</label>
<input type="text" id="product" placeholder="e.g. iPhone Case">
<div class="row">
<div>
<label>Qty</label>
<input type="number" id="qty" value="1" min="1">
</div>
<div>
<label>Notes</label>
<input type="text" id="notes" placeholder="Box damaged">
</div>
</div>
</div>
<button class="btn-submit" onclick="submitToSheet()" id="submitBtn">✓ Add to Inventory</button>
<button class="btn-check" onclick="checkMissing()">🔍 Check Missing Items</button>
<div id="result">Ready to scan</div>
<div id="missingList"></div>
</div>
<script>
const scriptUrlInput = document.getElementById('scriptUrl');
const deviceInput = document.getElementById('deviceName');
const scanInput = document.getElementById('scanData');
const result = document.getElementById('result');
const submitBtn = document.getElementById('submitBtn');
const receiveFields = document.getElementById('receiveFields');
const missingList = document.getElementById('missingList');
let currentMode = 'receive';
let html5QrCode;
let lastScan = '';
let deferredPrompt;

scriptUrlInput.value = localStorage.getItem('scriptUrl') || '';
deviceInput.value = localStorage.getItem('deviceName') || 'Warehouse';
scriptUrlInput.onchange = () => localStorage.setItem('scriptUrl', scriptUrlInput.value);
deviceInput.onchange = () => localStorage.setItem('deviceName', deviceInput.value);

// PWA Install
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btnInstall').style.display = 'block';
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('btnInstall').style.display = 'none';
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnReceive').className = mode === 'receive'? 'active' : '';
  document.getElementById('btnShip').className = mode === 'ship'? 'active' : '';
  receiveFields.style.display = mode === 'receive'? 'block' : 'none';
  submitBtn.textContent = mode === 'receive'? '✓ Add to Inventory' : '📤 Ship Out & Remove';
}

function playAlarm() {
  navigator.vibrate([200,100,200]);
  document.body.classList.add('alarm');
  setTimeout(() => document.body.classList.remove('alarm'), 2000);
}

function setResult(msg, type) {
  result.textContent = msg;
  result.className = type;
}

function startScan() {
  document.getElementById('reader').style.display = 'block';
  document.getElementById('btnScan').style.display = 'none';
  document.getElementById('btnStop').style.display = 'block';
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: {width: 250, height: 250} },
    (decodedText) => {
      if (decodedText === lastScan) return;
      lastScan = decodedText;
      scanInput.value = decodedText;
      navigator.vibrate(100);
      setResult('Scanned: ' + decodedText, 'ok');
      stopScan();
      submitToSheet();
      setTimeout(() => lastScan = '', 2000);
    },
    (error) => {}
  ).catch(err => setResult('Camera error: ' + err, 'err'));
}

function stopScan() {
  if (html5QrCode) {
    html5QrCode.stop();
    document.getElementById('reader').style.display = 'none';
    document.getElementById('btnScan').style.display = 'block';
    document.getElementById('btnStop').style.display = 'none';
  }
}

async function submitToSheet() {
  const url = scriptUrlInput.value.trim();
  const scan = scanInput.value.trim();
  if (!url) return setResult('Add Google Script URL first', 'err');
  if (!scan) return setResult('Scan tracking no first', 'err');
  setResult('Processing...', 'ok');
  try {
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({
        scan: scan,
        mode: currentMode,
        product: document.getElementById('product').value,
        qty: document.getElementById('qty').value,
        notes: document.getElementById('notes').value,
        device: deviceInput.value
      })
    });
    const data = await res.json();
    if (data.status === 'duplicate' || data.status === 'notfound') {
      playAlarm();
      let msg = `⚠️ ${data.message}`;
      if (data.firstScan) msg += `\nReceived: ${new Date(data.firstScan).toLocaleString()}`;
      setResult(msg, data.status === 'notfound'? 'notfound' : 'duplicate');
    } else {
      setResult('✓ ' + data.message, 'ok');
      scanInput.value = '';
      document.getElementById('product').value = '';
      document.getElementById('qty').value = '1';
      document.getElementById('notes').value = '';
    }
  } catch(e) {
    setResult('Error: Check URL or internet', 'err');
  }
}

async function checkMissing() {
  const url = scriptUrlInput.value.trim();
  if (!url) return setResult('Add Google Script URL first', 'err');
  setResult('Loading inventory...', 'ok');
  missingList.style.display = 'none';
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.status === 'ok') {
      if (data.total === 0) {
        setResult('✓ No missing items. All shipped!', 'ok');
      } else {
        setResult(`⚠️ ${data.total} items not scanned yet`, 'notfound');
        missingList.style.display = 'block';
        missingList.innerHTML = '<strong>Missing/Unshipped:</strong><br>' +
          data.missing.map(i => `• ${i.tracking} - ${i.product || 'No name'}`).join('<br>');
      }
    } else {
      setResult('Error loading data', 'err');
    }
  } catch(e) {
    setResult('Error: Check URL or internet', 'err');
  }
}
</script>
</body>
</html>
